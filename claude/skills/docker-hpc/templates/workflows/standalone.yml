name: Build and Push {{TOOL_NAME}} Docker Image

# Trigger: push a tag like v1.4.0
# Image pushed to: {{DOCKER_USER}}/{{TOOL_NAME}}:<version> and :latest

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (e.g. 1.4.0)"
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building: {{DOCKER_USER}}/{{TOOL_NAME}}:${VERSION}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: {{DOCKER_USER}}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            {{DOCKER_USER}}/{{TOOL_NAME}}:${{ steps.meta.outputs.version }}
            {{DOCKER_USER}}/{{TOOL_NAME}}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
