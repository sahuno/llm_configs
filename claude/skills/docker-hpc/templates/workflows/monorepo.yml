name: Build and Push Docker Image

# Tag format: {tool}-v{version}  e.g. samtools-v1.21, dorado-v1.4.0
# Image pushed to: sahuno/{tool}:{version} and :latest
#
# Manual trigger: workflow_dispatch with tool + version inputs

on:
  push:
    tags:
      - "*-v*.*.*"
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool name (must match containers/self_made/{tool}/ directory)"
        required: true
      version:
        description: "Version tag (e.g. 1.21)"
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse tool and version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TOOL="${{ github.event.inputs.tool }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG##*-v}"
            TOOL="${TAG%-v*}"
          fi
          echo "tool=${TOOL}"       >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          DOCKERFILE="containers/self_made/${TOOL}/Dockerfile"
          if [[ ! -f "$DOCKERFILE" ]]; then
            echo "ERROR: $DOCKERFILE not found — check tool name matches a directory in containers/self_made/"
            exit 1
          fi
          echo "dockerfile=${DOCKERFILE}" >> $GITHUB_OUTPUT
          echo "Tool: ${TOOL} | Version: ${VERSION} | Dockerfile: ${DOCKERFILE}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER || 'sahuno' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/self_made/${{ steps.meta.outputs.tool }}
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: |
            ${{ vars.DOCKER_USER || 'sahuno' }}/${{ steps.meta.outputs.tool }}:${{ steps.meta.outputs.version }}
            ${{ vars.DOCKER_USER || 'sahuno' }}/${{ steps.meta.outputs.tool }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
