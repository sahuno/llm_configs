# slurmConfig/config.yaml — Production SLURM profile (optimal resources)
# Author: Samuel Ahuno (ekwame001@gmail.com)
# Date: 2026-02-28
#
# Purpose: Full-scale production runs on complete datasets.
#   - componc_cpu default — no 2hr wall-clock limit
#   - componc_gpu_batch for GPU rules — full basecalling runs
#   - Generous memory and CPUs for throughput
#   - No keep-going — fail explicitly so issues are caught early
#   - All rules explicitly configured with optimal resources
#
# Usage:
#   snakemake --workflow-profile /abs/path/to/slurmConfig ...
#
# Snakemake 9 conventions:
#   - mem_mb: 0  (zeros out built-in default; prevents SLURM_MEM_PER_NODE conflict)
#   - mem_mb_per_cpu everywhere (never mem:)
#   - slurm_account in default-resources

executor: slurm

default-resources:
    slurm_partition: "componc_cpu"
    slurm_account: "greenbab"
    mem_mb: 0
    mem_mb_per_cpu: 32000
    cpus_per_task: 8
    nodes: 1
    runtime: 480

set-resources:
    # --- GPU rules (componc_gpu_batch: no wall-clock limit, max GPUs) ---
    mod_bases:
        slurm_partition: "componc_gpu_batch"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 3400
        slurm_extra: "'--gres=gpu:4'"
        mem_mb_per_cpu: 34000
        cpus_per_task: 8

    # --- CPU-heavy rules (componc_cpu: generous time + memory) ---
    sort_mod_bases:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 2400
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    merge_bams:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 400
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    mark_duplicates:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 2400
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    modkit_summary:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 2400
        mem_mb_per_cpu: 256000
        cpus_per_task: 2
    run_clair:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        runtime: 2400
        nodes: 1
        mem_mb_per_cpu: 64000
        cpus_per_task: 12
    call_snps_indels:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        runtime: 2400
        nodes: 1
        mem_mb_per_cpu: 64000
        cpus_per_task: 12
    pileup_and_tracks_minCov:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        runtime: 2400
        nodes: 1
        mem_mb_per_cpu: 64000
        cpus_per_task: 8

    # --- Lightweight rules (cpushort is fine — quick turnaround) ---
    index_bam:
        slurm_partition: "cpushort"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 60
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    methylartist_locus:
        slurm_partition: "cpushort"
        slurm_account: "greenbab"
        runtime: 120
        nodes: 1
        mem_mb_per_cpu: 16000
        cpus_per_task: 4
    bamCoverage_toBigWig:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        runtime: 420
        nodes: 1
        mem_mb_per_cpu: 16000
        cpus_per_task: 4

# --- Execution flags (strict for production) ---
jobs: unlimited
keep-incomplete: true
printshellcmds: true
latency-wait: 360
max-status-checks-per-second: 1

use-singularity: true
singularity-args: "--bind /data1/greenbab/,/data1/collab001/"
