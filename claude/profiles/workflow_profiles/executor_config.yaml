# executor_config.yaml — Default SLURM profile for ONT methylation pipelines
# Author: Samuel Ahuno (ekwame001@gmail.com)
# Date: 2026-02-28 (fixed)
#
# Follows Snakemake 9 + snakemake-executor-plugin-slurm conventions:
#   - mem_mb: 0  zeros out Snakemake 9 built-in default (prevents SLURM_MEM conflict)
#   - mem_mb_per_cpu (not mem) in all resource blocks
#   - slurm_account in default-resources (required; executor plugin ignores env var)

executor: slurm

default-resources:
    slurm_partition: "componc_cpu"
    slurm_account: "greenbab"
    mem_mb: 0
    mem_mb_per_cpu: 16000
    cpus_per_task: 4
    nodes: 1
    runtime: 5400

set-resources:
    mod_bases:
        slurm_partition: "componc_gpu_batch"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 3400
        slurm_extra: "'--gres=gpu:4'"
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    sort_mod_bases:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 2400
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    merge_bams:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 400
        mem_mb_per_cpu: 24000
        cpus_per_task: 8
    mark_duplicates:
        slurm_partition: "componc_cpu"
        slurm_account: "greenbab"
        nodes: 1
        runtime: 2400
        mem_mb_per_cpu: 24000
        cpus_per_task: 8

jobs: unlimited
keep-incomplete: true
printshellcmds: true
latency-wait: 360
max-status-checks-per-second: 1

use-singularity: true
singularity-args: "--bind /data1/greenbab/,/data1/collab001/"
